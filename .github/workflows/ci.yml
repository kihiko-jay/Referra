name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: referraios
          POSTGRES_PASSWORD: referraios
          POSTGRES_DB: referraios
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U referraios"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://referraios:referraios@localhost:5432/referraios?schema=public
      JWT_ACCESS_SECRET: ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared + generate Prisma client
        run: |
          pnpm --filter @referraios/shared build
          pnpm --filter @referraios/api exec prisma generate

      - name: Apply migrations
        run: pnpm --filter @referraios/api exec prisma migrate deploy

      - name: Typecheck
        run: pnpm run typecheck

      - name: Lint
        run: pnpm run lint

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build
