# Render blueprint for ReferraIOS.
# Secrets marked `sync: false` must be set in the Render dashboard.
databases:
  - name: referraios-db
    databaseName: referraios
    user: referraios
    plan: free

services:
  - type: keyvalue
    name: referraios-redis
    plan: free
    ipAllowList: []

  - type: web
    name: referraios-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: DATABASE_URL
        fromDatabase:
          name: referraios-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: referraios-redis
          type: keyvalue
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: CORS_ORIGINS
        sync: false # e.g. https://referraios-web.onrender.com
      - key: API_PUBLIC_URL
        sync: false
      - key: WEB_PUBLIC_URL
        sync: false
      - key: PLATFORM_FEE_BPS
        value: "0"
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MPESA_ENV
        value: sandbox
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        sync: false
      - key: MPESA_PASSKEY
        sync: false
      - key: MPESA_B2C_INITIATOR
        sync: false
      - key: MPESA_B2C_SECURITY_CREDENTIAL
        sync: false
      - key: FLW_SECRET_KEY
        sync: false
      - key: FLW_WEBHOOK_HASH
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_STARTER
        sync: false
      - key: STRIPE_PRICE_GROWTH
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false

  - type: web
    name: referraios-web
    runtime: static
    buildCommand: corepack enable && pnpm install --frozen-lockfile && pnpm --filter @referraios/web build
    staticPublishPath: apps/web/dist
    envVars:
      - key: VITE_API_URL
        sync: false # e.g. https://referraios-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
